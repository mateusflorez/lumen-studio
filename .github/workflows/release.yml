name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # criar GitHub Release e upload do instalador
  packages: write   # autenticar no GHCR
  pages: write      # publicar latest.json no GitHub Pages
  id-token: write   # necessário para Pages deploy

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_BUILD_CACHE: ghcr.io/${{ github.repository_owner }}/senai-studio-build-cache

jobs:
  # ──────────────────────────────────────────────────────────────
  # BUILD — compila e assina o instalador Windows, cria a Release
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    outputs:
      release_id: ${{ steps.tauri.outputs.releaseId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cache da compilação Rust — key derivada do Cargo.lock (mesmo padrão
      # de cache por hash de lockfile usado no PrimeSys com registry cache)
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Lumen Studio ${{ github.ref_name }}'
          releaseBody: |
            ## O que mudou

            Veja o histórico de commits para detalhes desta versão.

            ## Instalação

            Baixe o arquivo `_x64-setup.exe` abaixo e execute o instalador.
          releaseDraft: false
          prerelease: false

  # ──────────────────────────────────────────────────────────────
  # MANIFEST — gera latest.json e publica no GitHub Pages
  # ──────────────────────────────────────────────────────────────
  publish-manifest:
    name: Publish Update Manifest
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Fetch release and build latest.json
        run: |
          TAG="${{ github.ref_name }}"

          RELEASE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          INSTALLER_URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("x64-setup\\.exe$")) | .browser_download_url')

          SIG_URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("x64-setup\\.exe\\.sig$")) | .browser_download_url')

          SIGNATURE=$(curl -s "$SIG_URL")
          PUB_DATE=$(echo "$RELEASE" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE" | jq -r '.body')
          VERSION="${TAG#v}"

          jq -n \
            --arg version  "$VERSION" \
            --arg notes    "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg url      "$INSTALLER_URL" \
            --arg sig      "$SIGNATURE" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  url:       $url,
                  signature: $sig
                }
              }
            }' > pages/latest.json

          echo "Generated latest.json for version $VERSION:"
          cat pages/latest.json

      - name: Commit and push latest.json
        run: |
          cd pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update latest.json → ${{ github.ref_name }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
